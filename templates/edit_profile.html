<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile - Zyra</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0a0a0f;
            color: white;
            font-family: Arial, sans-serif;
        }

        nav {
            background-color: rgba(10, 10, 20, 0.95);
            padding: 18px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #a855f733;
            backdrop-filter: blur(10px);
        }

        nav .logo {
            font-size: 22px;
            font-weight: bold;
            background: linear-gradient(90deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        nav a {
            color: #cccccc;
            text-decoration: none;
            margin-left: 28px;
            font-size: 15px;
        }

        nav a:hover { color: #a855f7; }

        .container {
            max-width: 500px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .form-box {
            background: linear-gradient(135deg, #1a1a2e, #16162a);
            border: 1px solid #a855f733;
            border-radius: 16px;
            padding: 40px;
        }

        .form-box h2 {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-box p {
            color: #777777;
            font-size: 14px;
            margin-bottom: 30px;
        }

        label {
            display: block;
            color: #aaaaaa;
            font-size: 13px;
            margin-bottom: 6px;
        }

        input, select {
            width: 100%;
            padding: 12px 14px;
            background: #0a0a0f;
            border: 1px solid #a855f733;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            margin-bottom: 18px;
            outline: none;
        }

        input:focus, select:focus { border-color: #a855f7; }

        select option { background: #0a0a0f; }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn:hover { opacity: 0.9; }

        .back-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .back-link a {
            color: #a855f7;
            text-decoration: none;
        }
    </style>
</head>
<body>

 <nav>
    <a href="/" style="text-decoration:none; display:flex; align-items:center; gap:8px;">
        <svg width="38" height="38" viewBox="0 0 38 38" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="zgrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#a855f7"/>
                    <stop offset="100%" style="stop-color:#ec4899"/>
                </linearGradient>
            </defs>
            <rect width="38" height="38" rx="10" fill="url(#zgrad)"/>
            <text x="7" y="28" font-family="Arial" font-weight="900" font-size="24" fill="white">Z</text>
        </svg>
        <span style="font-size:22px; font-weight:900; background:linear-gradient(90deg,#a855f7,#ec4899); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">Zyra</span>
    </a>
    <div>
        <a href="/">Home</a>
        <a href="/feed">Feed</a>
        <a href="/announcements">📢 Announcements</a>
        <a href="/post">Post</a>
        <a href="/match">Find Teammate</a>
        <a href="/askzyra">AskZyra 🤖</a>
        {% if session.get('uid') %}
            <a href="/myposts">My Posts</a>
            <a href="/profile">Profile</a>
            <a href="/logout">Logout</a>
        {% else %}
            <a href="/login">Login</a>
            <a href="/signup">Sign Up</a>
        {% endif %}
    </div>
</nav>

    <div class="container">
        <div class="form-box">
            <h2>✏️ Edit Profile</h2>
            <p>Update your branch, semester and skills</p>

            <form action="/edit-profile" method="POST">
                <label>Branch</label>
                <select name="branch">
                    <option {% if student.branch == 'Computer Science' %}selected{% endif %}>Computer Science</option>
                    <option {% if student.branch == 'Electronics' %}selected{% endif %}>Electronics</option>
                    <option {% if student.branch == 'Mechanical' %}selected{% endif %}>Mechanical</option>
                    <option {% if student.branch == 'Civil' %}selected{% endif %}>Civil</option>
                    <option {% if student.branch == 'BBA' %}selected{% endif %}>BBA</option>
                    <option {% if student.branch == 'BCA' %}selected{% endif %}>BCA</option>
                    <option {% if student.branch == 'Other' %}selected{% endif %}>Other</option>
                </select>

                <label>Semester</label>
                <select name="semester">
                    <option {% if student.semester == '1st' %}selected{% endif %}>1st</option>
                    <option {% if student.semester == '2nd' %}selected{% endif %}>2nd</option>
                    <option {% if student.semester == '3rd' %}selected{% endif %}>3rd</option>
                    <option {% if student.semester == '4th' %}selected{% endif %}>4th</option>
                    <option {% if student.semester == '5th' %}selected{% endif %}>5th</option>
                    <option {% if student.semester == '6th' %}selected{% endif %}>6th</option>
                </select>

                <label>Skills (comma separated)</label>
                <input type="text" name="skills" value="{{ student.skills }}" required>

                <button type="submit" class="btn">Save Changes →</button>
            </form>

            <div class="back-link">
                <a href="/profile">← Back to Profile</a>
            </div>
        </div>
    </div>

</body>
</html>
