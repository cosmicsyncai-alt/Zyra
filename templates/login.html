<!DOCTYPE html>
<html>
<head>
    <title>Login - Zyra</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0a0a0f;
            color: white;
            font-family: Arial, sans-serif;
            min-height: 100vh;
        }

        nav {
            background-color: rgba(10, 10, 20, 0.95);
            padding: 18px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #a855f733;
            backdrop-filter: blur(10px);
        }

        nav .logo {
            font-size: 22px;
            font-weight: bold;
            background: linear-gradient(90deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        nav a {
            color: #cccccc;
            text-decoration: none;
            margin-left: 28px;
            font-size: 15px;
        }

        nav a:hover { color: #a855f7; }

        .container {
            max-width: 450px;
            margin: 80px auto;
            padding: 0 20px;
        }

        .form-box {
            background: linear-gradient(135deg, #1a1a2e, #16162a);
            border: 1px solid #a855f733;
            border-radius: 16px;
            padding: 40px;
        }

        .form-box h2 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-box p {
            color: #777777;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .error {
            background: #ff444422;
            border: 1px solid #ff4444;
            color: #ff8888;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        label {
            display: block;
            color: #aaaaaa;
            font-size: 13px;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            background: #0a0a0f;
            border: 1px solid #a855f733;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            margin-bottom: 18px;
            outline: none;
        }

        input:focus { border-color: #a855f7; }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn:hover { opacity: 0.9; }

        .signup-link {
            text-align: center;
            margin-top: 20px;
            color: #777777;
            font-size: 14px;
        }

        .signup-link a {
            color: #a855f7;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <nav>
<a href="/" style="text-decoration:none; display:flex; align-items:center; gap:8px;">
    <svg width="38" height="38" viewBox="0 0 38 38" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="zgrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#a855f7"/>
                <stop offset="100%" style="stop-color:#ec4899"/>
            </linearGradient>
        </defs>
        <rect width="38" height="38" rx="10" fill="url(#zgrad)"/>
        <text x="7" y="28" font-family="Arial" font-weight="900" font-size="24" fill="white">Z</text>
    </svg>
    <span style="font-size:22px; font-weight:900; background:linear-gradient(90deg,#a855f7,#ec4899); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">Zyra</span>
</a>        <div>
            <a href="/login">Login</a>
            <a href="/signup">Sign Up</a>
        </div>
    </nav>

    <div class="container">
        <div class="form-box">
            <h2>Welcome Back 👋</h2>
            <p>Login to your Zyra account</p>

            {% if error %}
            <div class="error">⚠️ {{ error }}</div>
            {% endif %}

            <form action="/login" method="POST">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter your email" required>

                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>

                <button type="submit" class="btn">Login →</button>
            </form>

            <div class="signup-link">
                Don't have an account? <a href="/signup">Sign up here</a>
            </div>
        </div>
    </div>

</body>
</html>
