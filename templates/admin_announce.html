<!DOCTYPE html>
<html>
<head>
    <title>Admin - Post Announcement</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0a0a0f;
            color: white;
            font-family: Arial, sans-serif;
            min-height: 100vh;
        }

        nav {
            background-color: rgba(10, 10, 20, 0.95);
            padding: 18px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #a855f733;
            backdrop-filter: blur(10px);
        }

        nav .logo {
            font-size: 22px;
            font-weight: bold;
            background: linear-gradient(90deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .container {
            max-width: 500px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .form-box {
            background: linear-gradient(135deg, #1a1a2e, #16162a);
            border: 1px solid #a855f733;
            border-radius: 16px;
            padding: 40px;
        }

        .form-box h2 {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-box p {
            color: #777777;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .error {
            background: #ff444422;
            border: 1px solid #ff4444;
            color: #ff8888;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        label {
            display: block;
            color: #aaaaaa;
            font-size: 13px;
            margin-bottom: 6px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 14px;
            background: #0a0a0f;
            border: 1px solid #a855f733;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            margin-bottom: 18px;
            outline: none;
        }

        textarea {
            height: 120px;
            resize: vertical;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #a855f7;
        }

        select option { background: #0a0a0f; }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn:hover { opacity: 0.9; }

        .admin-badge {
            display: inline-block;
            background: linear-gradient(135deg, #a855f722, #ec489922);
            color: #d8a0f7;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            border: 1px solid #a855f744;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <nav>
 <a href="/" style="text-decoration:none; display:flex; align-items:center; gap:8px;">
    <svg width="38" height="38" viewBox="0 0 38 38" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="zgrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#a855f7"/>
                <stop offset="100%" style="stop-color:#ec4899"/>
            </linearGradient>
        </defs>
        <rect width="38" height="38" rx="10" fill="url(#zgrad)"/>
        <text x="7" y="28" font-family="Arial" font-weight="900" font-size="24" fill="white">Z</text>
    </svg>
    <span style="font-size:22px; font-weight:900; background:linear-gradient(90deg,#a855f7,#ec4899); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">Zyra</span>
</a>
    </nav>

    <div class="container">
        <div class="form-box">
            <div class="admin-badge">🔐 Admin Panel</div>
            <h2>Post Announcement</h2>
            <p>Only admins can post announcements</p>

            {% if error %}
            <div class="error">⚠️ {{ error }}</div>
            {% endif %}

            <form action="/admin/announce" method="POST">
                <label>Admin Key</label>
                <input type="password" name="admin_key" placeholder="Enter admin key" required>

                <label>Category</label>
                <select name="category">
                    <option value="Exam">📝 Exam</option>
                    <option value="Holiday">🎉 Holiday</option>
                    <option value="Event">📅 Event</option>
                    <option value="Job">💼 Job</option>
                    <option value="General">📌 General</option>
                </select>

                <label>Title</label>
                <input type="text" name="title" placeholder="Announcement title" required>

                <label>Description</label>
                <textarea name="description" placeholder="Full announcement details..."></textarea>

                <button type="submit" class="btn">Post Announcement →</button>
            </form>
        </div>
    </div>

</body>
</html>
